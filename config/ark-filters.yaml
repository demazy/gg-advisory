# Filters for ARK Capture Solutions monthly intelligence brief
# Focus: CCUS, industrial decarbonisation, carbon capture in AU/APAC

allow_domains:
# Australian government
- '*.gov.au'
- '*.edu.au'
- dcceew.gov.au
- arena.gov.au
- cleanenergyregulator.gov.au
- industry.gov.au
- treasury.gov.au
- csiro.au
- ga.gov.au
# CEFC & clean energy bodies
- cefc.com.au
- cleanenergyfinancecorp.com.au
# Global CCUS authority (Melbourne HQ)
- globalccsinstitute.com
# International bodies
- iea.org
- irena.org
- ipieca.org
# Net Zero
- netzeroaustralia.net.au
# Industry bodies
- appea.com.au
- minerals.org.au
- steel.org.au
- ccaa.com.au
- aibn.com.au
- australianinvestmentcouncil.com.au
# Industrial companies (potential buyers)
- bluescopesteel.com
- santos.com
- woodside.com
- agl.com.au
- originenergy.com.au
- vivaenergy.com.au
- boral.com
- boral.com.au
# Competitor / market intelligence
- calix.com.au
- carbonbrief.org
- esgtoday.com
- climatecouncil.org.au
- igcc.org.au
- newenergynexus.com
- techcouncil.com.au
- smartenergy.org.au

deny_domains: []

domain_deny_substrings:
  arena.gov.au:
    - /renewable-energy/
  cefc.com.au:
    - /where-we-invest/

title_deny_regex:
  - (cookie|privacy|terms|subscribe|sign\s?up|login|careers|jobs)
  - '(webinar|tickets|register\s+(?:for|to\s+attend|your\s+place|now\s+for))'
  # Reject purely financial results (not decarbonisation-related)
  - '^\s*(quarterly|annual|half.year)\s+(results|earnings|report)\s*$'
  - 'dividend|share\s+buyback|capital\s+raising'

