  # ─── NATIONAL: Major rolling programs (previously missing) ───────────────────

  - id: rd-tax-incentive
    name: "R&D Tax Incentive (R&DTI)"
    admin: "ATO + Department of Industry, Science and Resources (DISR)"
    level: national
    type: grant
    amount: "43.5% refundable tax offset (SMEs, turnover < $20M); 38.5%+ non-refundable (larger companies)"
    deadline: null
    deadline_type: rolling
    deadline_label: "Register within 10 months of financial year end (e.g. 30 April 2026 for FY25)"
    target_stage: "Any incorporated Australian company conducting eligible R&D activities"
    url: "https://business.gov.au/grants-and-programs/research-and-development-tax-incentive"
    description: >
      Australia's largest innovation incentive offers a 43.5% refundable tax offset on eligible R&D
      expenditure for SMEs with turnover under $20M — effectively a cash rebate on R&D costs. Eligible
      costs include wages for R&D staff, contractor costs, and materials used in trials. Larger companies
      receive a non-refundable offset based on R&D intensity. Register R&D activities with DISR (via
      business.gov.au) before claiming in your tax return; registration must be lodged within 10 months
      of financial year end. The eligible expenditure cap was increased to $150M in recent amendments.
    why_it_matters: >
      For any climate-tech startup conducting genuine technical experimentation — hardware prototypes,
      novel software, new materials processes — this is the single most accessible cash injection
      available. It's not a competitive grant; all eligible companies receive the offset.
    signals: >
      Consult an R&D tax specialist before lodging — the ATO audits R&D claims closely and requires
      contemporaneous records of technical uncertainty, hypothesis, experiments, and outcomes.
    show_from: "2026-01-01"
    show_until: null

