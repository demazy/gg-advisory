      Australia's premier deep-tech non-dilutive accelerator for research-driven startups.
      Top teams receive up to $80,000 cash from the program's internal fund. Cohort 11 is
      underway with a showcase on 11 June 2026 in Melbourne. Cohort 12 applications are
      expected to open mid-2026. Climate-tech, energy, and materials ventures regularly feature.
    why_it_matters: >
      The most prestigious non-dilutive pathway for early-stage deep-tech founders in Australia.
      Subscribe to on@csiro.au for early notification when Cohort 12 opens.
    show_from: "2026-03-01"
    show_until: "2027-03-31"

  # ─── NATIONAL: Rolling / always-open programs ────────────────────────────────

  - id: arena-fmia-innovation-fund
    name: "Future Made in Australia (FMIA) Innovation Fund — ARENA"
    admin: "Australian Renewable Energy Agency (ARENA)"
    level: national
    type: grant
    amount: "$1.5 billion total pool; no per-project maximum (min 50% co-contribution)"
    deadline: null
    deadline_type: rolling
    deadline_label: "Rolling — no fixed close date (launched December 2025)"
    target_stage: "Demonstration to commercialisation (TRL 3+)"
    url: "https://arena.gov.au/funding/future-made-in-australia-innovation-fund/"
    description: >
      ARENA's flagship $1.5 billion fund targets three priority streams: Green Metals ($750M for
      iron, steel, alumina, aluminium), Renewable Energy Technology Manufacturing ($200M for
      batteries, solar components, electrolysers), and Low Carbon Liquid Fuels ($250M for
      sustainable aviation fuel and renewable diesel). Minimum 50% co-contribution required.
      Grants above $50M require ministerial sign-off. Submit via Expression of Interest in ARENANet.
    why_it_matters: >
      The largest single cleantech manufacturing opportunity in Australia's history. ARENA encourages
      early engagement before submitting an EOI — contact their team first.
    show_from: "2026-01-01"
    show_until: null

  - id: arena-advancing-renewables
    name: "ARENA Advancing Renewables Program"
    admin: "Australian Renewable Energy Agency (ARENA)"
    level: national
    type: grant
    amount: "Flexible, no fixed cap per project"
    deadline: null
    deadline_type: rolling
    deadline_label: "Always open"
    target_stage: "Development, demonstration, pre-commercial deployment (TRL 4+)"
    url: "https://arena.gov.au/funding/advancing-renewables-program/"
    description: >
      ARENA's foundational program funds development, demonstration, and pre-commercial deployment
      across all renewable energy and grid technologies. No fixed cap per project; milestone-based
      disbursement. Submit an EOI in ARENANet — ARENA staff recommend calling before submitting.
      Recent examples include $5M to a Queensland critical minerals startup (February 2026).
    why_it_matters: >
      Covers the widest range of clean energy technologies of any national program. Suitable for
      companies with working prototypes ready for demonstration at scale.
    show_from: "2026-01-01"
    show_until: null

  - id: industry-growth-program
    name: "Industry Growth Program (IGP)"
    admin: "Department of Industry, Science and Resources / business.gov.au"
    level: national
    type: grant
    amount: "$50,000–$5.25M matched grants (two tiers)"
    deadline: null
    deadline_type: rolling
    deadline_label: "Rolling — ~90% of initial pool projected spent by June 2026"
    target_stage: "Early-stage commercialisation to growth"
    url: "https://business.gov.au/grants-and-programs/industry-growth-program"
    description: >
      The federal government's primary SME commercialisation program offers matched grants aligned
      with National Reconstruction Fund priorities including renewables, low-emissions technologies,
      and critical minerals. Tier 1: Early-Stage Commercialisation ($50K–$250K, dollar-for-dollar
      matched). Tier 2: Commercialisation & Growth ($100K–$5M). Applications are always open but
      approximately 90% of the initial funding pool was projected to be spent by June 2026.
    why_it_matters: >
      One of the only national programs directly supporting cleantech SMEs at early stage. Apply
      urgently — the pool is depleting. The NRF Net Zero Fund (concessional debt/equity, $3B+)
      is expected to open mid-2026 as a growth-stage complement.
    signals: >
      NRF Net Zero Fund expected to open mid-2026 for larger growth-stage capital needs.
    show_from: "2026-01-01"
    show_until: null

