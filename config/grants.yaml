# config/grants.yaml — Cleantech & Start-up Ecosystem: Grants & Accelerators Radar
#
# Each entry is shown in the monthly digest when the current month falls within its
# visibility window (show_from..show_until).
#
# Fields:
#   id            — unique slug (used for dedup and ordering)
#   name          — program name (used as section heading)
#   admin         — administering organisation
#   level         — national | vic | nsw | qld | sa | wa | tas | act | nt
#   type          — grant | repayable_grant | equity | accelerator | incubator | debt_equity
#   amount        — human-readable funding range string
#   deadline      — ISO date (YYYY-MM-DD) if fixed; omit or null if rolling/tbc
#   deadline_type — fixed | rolling | tbc
#   deadline_label — human-readable deadline string (overrides auto-generated label)
#   target_stage  — string describing eligible startup stage
#   url           — canonical program URL
#   description   — 2-4 sentence summary (used as body text in digest)
#   why_it_matters — 1-2 sentence rationale for founders/investors
#   signals       — optional: what to watch next (e.g. next round, next cohort)
#   show_from     — ISO date: first digest month to include this entry (YYYY-MM-DD)
#   show_until    — ISO date: last digest month to include; omit/null = show indefinitely
#
# To retire an entry: set show_until to the month it expired (e.g. 2026-03-31).
# To add a new round: duplicate the entry, update deadline and show_from/show_until.

grants:

  # ─── NATIONAL: Fixed-deadline programs ──────────────────────────────────────

  - id: energylab-accelerator-2026
    name: "EnergyLab Climate Solutions Accelerator 2026"
    admin: "EnergyLab"
    level: national
    type: accelerator
    amount: "$80,000–$100,000 equity investment per accepted startup"
    deadline: "2026-03-15"
    deadline_type: fixed
    deadline_label: "15 March 2026"
    target_stage: "Early-stage to growth-stage"
    url: "https://energylab.org.au/programs/acceleration/"
    description: >
      Australia's largest cleantech accelerator offers early-stage and growth-stage climate-tech
      companies $80,000–$100,000 equity investment plus access to EnergyLab's investor network,
      mentors, and corporate partners. The 2026 cohort runs May–October. Any Australian startup
      is eligible; no sector restriction within climate/clean energy.
    why_it_matters: >
      Australia's highest-profile pathway for climate-tech founders seeking institutional backing
      and market entry. First-round interviews run 6–24 April 2026 for shortlisted applicants.
    signals: >
      EnergyLab also runs a separate Scaleup Program for later-stage companies (June–October 2026,
      non-dilutive); applications remain open after the accelerator closes.
    show_from: "2026-01-01"
    show_until: "2026-03-31"

  - id: act-icon-grant-2026
    name: "ACT Innovation Connect (ICON) Grant"
    admin: "Canberra Innovation Network (CBRIN) / ACT Government"
    level: act
    type: grant
    amount: "$10,000–$30,000 matched (dollar-for-dollar)"
    deadline: "2026-04-10"
    deadline_type: fixed
    deadline_label: "10 April 2026 (EOI)"
    target_stage: "Early-stage; concept to market-ready (turnover under $2M)"
    url: "https://cbrin.com.au/icon/"
    description: >
      The ACT Government's Innovation Connect grant provides $10,000–$30,000 in matched funding
      to early-stage Canberra-based businesses. Eligible costs include prototyping, market testing,
      IP/legal and commercialisation activities. The EOI round closes 10 April 2026.
    why_it_matters: >
      One of the few grants with a firm April deadline. Climate-tech founders based in or willing
      to establish in the ACT should apply immediately.
    show_from: "2026-01-01"
    show_until: "2026-04-30"

  - id: nsw-etcf-2026
    name: "NSW Emerging Technology Commercialisation Fund (ETCF) 2026"
    admin: "NSW Office of the Chief Scientist and Engineer"
    level: nsw
    type: repayable_grant
    amount: "$500,000–$2,000,000 per project (repayable grant; $20M pool)"
    deadline: "2026-04-29"
    deadline_type: fixed
    deadline_label: "29 April 2026, 10:00 AM AEST"
    target_stage: "TRL 3–7; deep-tech commercialisation"
    url: "https://chiefscientist.smartygrants.com.au/ETCF2026"
    description: >
      The NSW Office of the Chief Scientist and Engineer offers $500,000–$2M per project from a
      $20M pool. Priority sectors include net-zero technologies, local manufacturing, and housing
      innovation. Funding is a repayable grant (repayment triggered when EBITDA exceeds $500K).
      Matched funding required. Full applications due July 2026; outcomes October 2026.
    why_it_matters: >
      One of the largest state-level deep-tech commercialisation grants in Australia this year.
      Apply via SmartyGrants — the expression of interest stage closes 29 April.
    show_from: "2026-03-01"
    show_until: "2026-04-30"

  - id: csiro-on-accelerate-cohort12
    name: "CSIRO ON Accelerate — Cohort 12"
    admin: "CSIRO"
    level: national
    type: accelerator
    amount: "Up to $80,000 cash per team (non-dilutive); program valued at $150K+"
    deadline: null
    deadline_type: tbc
    deadline_label: "~Mid-2026 (subscribe: on@csiro.au)"
