# config/grants.yaml — Cleantech & Start-up Ecosystem: Grants & Accelerators Radar
#
# Each entry is shown in the monthly digest when the current month falls within its
# visibility window (show_from..show_until).
#
# Fields:
#   id            — unique slug (used for dedup and ordering)
#   name          — program name (used as section heading)
#   admin         — administering organisation
#   level         — national | vic | nsw | qld | sa | wa | tas | act | nt
#   type          — grant | repayable_grant | equity | accelerator | incubator | debt_equity
#   amount        — human-readable funding range string
#   deadline      — ISO date (YYYY-MM-DD) if fixed; omit or null if rolling/tbc
#   deadline_type — fixed | rolling | tbc
#   deadline_label — human-readable deadline string (overrides auto-generated label)
#   target_stage  — string describing eligible startup stage
#   url           — canonical program URL
#   description   — 2-4 sentence summary (used as body text in digest)
#   why_it_matters — 1-2 sentence rationale for founders/investors
#   signals       — optional: what to watch next (e.g. next round, next cohort)
#   show_from     — ISO date: first digest month to include this entry (YYYY-MM-DD)
#   show_until    — ISO date: last digest month to include; omit/null = show indefinitely
#
# To retire an entry: set show_until to the month it expired (e.g. 2026-03-31).
# To add a new round: duplicate the entry, update deadline and show_from/show_until.

grants:

