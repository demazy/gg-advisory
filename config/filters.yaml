deny_domains: []
domain_deny_substrings:
  arena.gov.au:
  - /renewable-energy/
  cefc.com.au:
  - /where-we-invest/
title_deny_regex:
- (cookie|privacy|terms|subscribe|sign\s?up|login|careers|jobs)
- '(webinar|tickets|register\s+(?:for|to\s+attend|your\s+place|now\s+for))'
# Filter EFRAG internal governance meeting notices (SR TEG, SRB, FRB, FR TEG)
- 'EFRAG\s+(?:SR\s+TEG|SRB|FRB|FR\s+TEG)\s+(?:Online\s+)?Meeting'
# Reject pure accounting/financial-reporting articles that are not sustainability-related.
# These mostly come from EFRAG/IASB and are not relevant to energy, ESG, or sustainable finance.
# Note: \bIFRS\s+\d+\b matches "IFRS 17" but NOT "IFRS S1" or "IFRS S2" (the sustainability standards).
- '\bIAS\s+\d+\b'
- '\bIFRS\s+\d+\b'
- hyperinflat
- 'endorsement advice'
- 'financial reporting technical expert'
- 'fair value option for investments'
